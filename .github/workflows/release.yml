name: Release Portable Zip

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          host: "windows"
          target: "desktop"
          arch: "win64_mingw"
          modules: "qtserialport"
          cache: true

      - name: Show build environment
        shell: pwsh
        run: |
          Write-Host "Workspace: $pwd"
          Write-Host "qmake path:"
          Get-Command qmake
          Write-Host "mingw32-make path:"
          Get-Command mingw32-make
          Write-Host "windeployqt path:"
          Get-Command windeployqt

      - name: Build project
        shell: pwsh
        run: |
          qmake serialAssistant.pro CONFIG+=release CONFIG+=console
          mingw32-make

      - name: Prepare dist folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item .\release\EmbeddedDebugToolbox.exe .\dist\

      - name: Deploy Qt runtime
        shell: pwsh
        run: |
          windeployqt --release --compiler-runtime .\dist\EmbeddedDebugToolbox.exe

      - name: Build portable zip
        shell: pwsh
        run: |
          Compress-Archive -Path .\dist\* -DestinationPath .\EmbeddedDebugToolbox_Portable.zip -Force

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: EmbeddedDebugToolbox_Portable.zip
