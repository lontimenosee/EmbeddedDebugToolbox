name: Verify And Install Qt

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  QT_VERSION: "6.11.0"
  QT_ARCH: "win64_mingw"
  QT_MODULES: "qtserialport"

jobs:
  verify-and-install-qt:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: "windows"
          target: "desktop"
          arch: ${{ env.QT_ARCH }}
          modules: ${{ env.QT_MODULES }}
          dir: ${{ github.workspace }}
          setup-python: false
          cache: false
          aqtversion: "==3.3.*"

      - name: Verify Qt tools
        shell: pwsh
        run: |
          Write-Host "qmake path:"
          Get-Command qmake
          Write-Host "mingw32-make path:"
          Get-Command mingw32-make
          Write-Host "windeployqt path:"
          Get-Command windeployqt
          qmake --version
          mingw32-make --version
          windeployqt --version
