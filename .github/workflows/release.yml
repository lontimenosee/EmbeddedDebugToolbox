name: Release Portable Zip

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  QT_VERSION: "6.11.1"
  QT_ARCH: "win64_msvc2022_64"
  QT_MODULES: "qtserialport"

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Probe Qt versions and modules
        shell: pwsh
        run: |
          python -m pip install --upgrade pip aqtinstall
          python -m aqt list-qt windows desktop | Select-String "6.11"
          python -m aqt list-qt windows desktop --arch $env:QT_VERSION
          python -m aqt list-qt windows desktop --modules $env:QT_VERSION $env:QT_ARCH

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: "windows"
          target: "desktop"
          arch: ${{ env.QT_ARCH }}
          modules: ${{ env.QT_MODULES }}
          cache: true

      - name: Show build environment
        shell: pwsh
        run: |
          Write-Host "Workspace: $pwd"
          Write-Host "qmake path:"
          Get-Command qmake
          Write-Host "nmake path:"
          Get-Command nmake
          Write-Host "windeployqt path:"
          Get-Command windeployqt

      - name: Build project
        shell: pwsh
        run: |
          qmake serialAssistant.pro -spec win32-msvc "CONFIG+=release"
          nmake /NOLOGO

      - name: Prepare dist folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item .\release\EmbeddedDebugToolbox.exe .\dist\
          @"
          Tag: $env:GITHUB_REF_NAME
          Commit: $env:GITHUB_SHA
          BuiltAtUtc: $(Get-Date -AsUTC -Format "yyyy-MM-dd HH:mm:ss")
          QtVersion: $env:QT_VERSION
          QtArch: $env:QT_ARCH
          QtModules: $env:QT_MODULES
          Toolchain: MSVC x64
          "@ | Set-Content .\dist\build-info.txt
          Get-ChildItem .\dist

      - name: Deploy Qt runtime
        shell: pwsh
        run: |
          windeployqt --release .\dist\EmbeddedDebugToolbox.exe
          Get-ChildItem .\dist -Recurse | Select-Object FullName

      - name: Build portable zip
        shell: pwsh
        run: |
          Compress-Archive -Path .\dist\* -DestinationPath .\EmbeddedDebugToolbox_Portable.zip -Force

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: EmbeddedDebugToolbox_Portable.zip
